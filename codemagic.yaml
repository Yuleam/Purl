workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      node: 22
      vars:
        BUNDLE_ID: "app.purl.knitting"
        APP_NAME: "Purl"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - name: 루트 npm 설치
        script: npm install
      - name: 웹 빌드 (www/ 생성)
        script: npm run build:web
      - name: iOS 플랫폼 추가 + 동기화
        script: |
          npx cap add ios || echo "iOS platform already exists"
          npx cap sync ios
      - name: iOS 프로젝트 구조 확인
        script: |
          echo "=== ios/App 내용 ==="
          ls -la ios/App/
          echo "=== xcodeproj 확인 ==="
          find ios -name "*.xcodeproj" -o -name "*.xcworkspace" 2>/dev/null
      - name: 키체인 초기화
        script: keychain initialize
      - name: 인증서 키 생성 + 서명 파일
        script: |
          openssl req -nodes -newkey rsa:2048 -keyout /tmp/cert_key.pem -out /tmp/cert_csr.pem -subj "/"
          export CERTIFICATE_PRIVATE_KEY=$(cat /tmp/cert_key.pem)
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
      - name: 키체인에 인증서 등록
        script: keychain add-certificates
      - name: 서명 프로파일 적용
        script: xcode-project use-profiles
      - name: 빌드 번호 설정
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" || echo "1")
          NEW_BUILD=$((LATEST + 1))
          echo "=== 빌드 번호: $NEW_BUILD ==="
          # Info.plist 직접 수정
          find ios -name "Info.plist" | while read plist; do
            echo "Updating $plist"
            plutil -replace CFBundleVersion -string "$NEW_BUILD" "$plist"
            plutil -p "$plist" | grep CFBundleVersion
          done
          # project.pbxproj의 CURRENT_PROJECT_VERSION도 수정
          find ios -name "project.pbxproj" | while read pbx; do
            echo "Updating $pbx"
            sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = $NEW_BUILD/g" "$pbx"
          done
      - name: IPA 빌드
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme App
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
