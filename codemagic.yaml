workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      node: 22
      vars:
        BUNDLE_ID: "app.purl.knitting"
        APP_NAME: "Purl"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: 루트 npm 설치
        script: npm install
      - name: 웹 빌드 (www/ 생성)
        script: npm run build:web
      - name: iOS 플랫폼 추가 + 동기화
        script: |
          npx cap add ios || echo "iOS platform already exists"
          npx cap sync ios
      - name: 키체인 초기화
        script: keychain initialize
      - name: 인증서 키 생성 + 서명 파일
        script: |
          openssl req -nodes -newkey rsa:2048 -keyout /tmp/cert_key.pem -out /tmp/cert_csr.pem -subj "/"
          export CERTIFICATE_PRIVATE_KEY=$(cat /tmp/cert_key.pem)
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
      - name: 키체인에 인증서 등록
        script: keychain add-certificates
      - name: 서명 프로파일 적용
        script: xcode-project use-profiles
      - name: 빌드 번호 설정
        script: |
          BUILD_NUM=$(date +%Y%m%d%H%M)
          echo "BUILD_NUM=$BUILD_NUM" >> $CM_ENV
          echo "=== 빌드 번호: $BUILD_NUM ==="
          cd ios/App
          find . -name "Info.plist" -not -path "*/Pods/*" | while read plist; do
            plutil -convert xml1 "$plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" "$plist"
            echo "$plist -> $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$plist")"
          done
      - name: IPA 빌드
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme App \
            --archive-xcargs "CURRENT_PROJECT_VERSION=$BUILD_NUM MARKETING_VERSION=1.0"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
