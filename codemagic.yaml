workflows:
  ios-release:
    name: iOS Flutter Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "app.mote.mote"
        APP_NAME: "Mote"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Flutter 의존성 설치
        working_directory: flutter
        script: flutter pub get

      - name: CocoaPods 설치
        working_directory: flutter/ios
        script: pod install

      - name: 키체인 초기화
        script: keychain initialize

      - name: 서명 인증서 + 프로비저닝 프로파일
        script: |
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create

      - name: 키체인에 인증서 등록
        script: keychain add-certificates

      - name: Xcode 서명 프로파일 적용
        script: xcode-project use-profiles

      - name: Flutter iOS 빌드 (IPA)
        working_directory: flutter
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - flutter/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
